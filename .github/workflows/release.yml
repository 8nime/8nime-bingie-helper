name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'
      - '.releaserc.json'
      - '*.md'
      - 'docs/**'
      - '.gitignore'

jobs:
  release:
    runs-on: ubuntu-latest
    if: |
      github.actor != 'dependabot[bot]' &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !startsWith(github.event.head_commit.message, 'chore')
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install semantic-release
        run: npm i -g semantic-release @semantic-release/exec @semantic-release/git @semantic-release/github

      - name: Release
        id: release
        # A late plugin flake (e.g. the cross-repo GitHub-release upload) must NOT
        # abort the job after the tag was already created+pushed -- otherwise the
        # publish chain below is skipped and the install repo never hears about the
        # new version (this is exactly how 1.8.0..1.11.2 got stuck at repo 1.7.1).
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release

      - name: Detect released version
        id: meta
        # Decide "did a release happen?" from the TAG semantic-release created on HEAD
        # this run -- NOT from the release step's exit code (addon.xml is always
        # populated, so it can't be the signal). A manual workflow_dispatch force-
        # (re)publishes the current addon.xml version (one-button backfill).
        run: |
          ADDON_ID="plugin.video.8nime.bingie.helper"
          ADDON_VER=$(sed -n 's/^[[:space:]]*version="\([^"]*\)".*/\1/p' addon.xml | head -1)
          TAG=$(git tag --points-at HEAD | sed -n 's/^v//p' | sort -V | tail -1)
          echo "addon_id=$ADDON_ID" >> "$GITHUB_OUTPUT"
          if [ -n "$TAG" ]; then
            echo "version=$TAG" >> "$GITHUB_OUTPUT"
            echo "released=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=$ADDON_VER" >> "$GITHUB_OUTPUT"
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package zip
        if: steps.meta.outputs.released == 'true' && steps.meta.outputs.version != ''
        run: |
          ADDON_ID="${{ steps.meta.outputs.addon_id }}"
          VERSION="${{ steps.meta.outputs.version }}"
          mkdir -p dist ".tmp/$ADDON_ID"
          rsync -a --exclude='.git' --exclude='.tmp' --exclude='dist' --exclude='.github' \
            . ".tmp/$ADDON_ID/"
          cd .tmp
          zip -r "../dist/${ADDON_ID}-${VERSION}.zip" "$ADDON_ID" \
            -x "*.pyc" -x "*__pycache__*"

      - name: Upload to 8nime-repo releases
        if: steps.meta.outputs.released == 'true' && steps.meta.outputs.version != ''
        env:
          GH_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          ADDON_ID="${{ steps.meta.outputs.addon_id }}"
          VERSION="${{ steps.meta.outputs.version }}"
          ZIP="dist/${ADDON_ID}-${VERSION}.zip"
          gh release create "$ADDON_ID" --repo 8nime/8nime-repo \
            --title "$ADDON_ID" --notes "" 2>/dev/null || true
          gh release upload "$ADDON_ID" "$ZIP" --repo 8nime/8nime-repo --clobber

      - name: Notify 8nime-repo to update metadata
        if: steps.meta.outputs.released == 'true' && steps.meta.outputs.version != ''
        env:
          GH_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          gh api repos/8nime/8nime-repo/dispatches \
            --method POST \
            -f event_type=addon-released \
            -f "client_payload[addon_id]=${{ steps.meta.outputs.addon_id }}" \
            -f "client_payload[version]=${{ steps.meta.outputs.version }}"
